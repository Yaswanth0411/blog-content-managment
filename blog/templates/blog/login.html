{% extends 'blog/base.html' %}
{% block title %}Login — BlogCMS{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="auth-card">
                <div class="text-center mb-4">
                    <div style="font-size:2.5rem; color:var(--accent);">📝</div>
                    <h2>Welcome Back</h2>
                    <p class="text-muted">Sign in to your BlogCMS account</p>
                </div>
                <form method="POST">
                    {% csrf_token %}
                    {% if form.errors %}
                    <div class="alert alert-danger">Invalid username or password.</div>
                    {% endif %}
                    <div class="mb-3">
                        <label>Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Your username" autofocus required>
                    </div>
                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                    </button>
                </form>
                <div class="auth-divider mt-4"><span>New here?</span></div>
                <a href="{% url 'register' %}" class="btn btn-outline-secondary w-100">Create an Account</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
