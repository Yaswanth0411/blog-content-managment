{% extends 'blog/base.html' %}
{% block title %}Delete Post — BlogCMS{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="auth-card text-center">
                <div style="font-size:3rem; color:var(--accent);">⚠️</div>
                <h2 class="mt-3">Delete Post?</h2>
                <p class="text-muted mt-2">
                    You are about to permanently delete:<br>
                    <strong>"{{ post.title }}"</strong>
                </p>
                <p class="text-danger small">This action <strong>cannot be undone</strong>. All comments will also be deleted.</p>

                <div class="d-flex gap-3 justify-content-center mt-4">
                    <form method="POST">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger px-4">
                            <i class="bi bi-trash me-2"></i>Yes, Delete
                        </button>
                    </form>
                    <a href="{{ post.get_absolute_url }}" class="btn btn-outline-secondary px-4">
                        <i class="bi bi-x-circle me-2"></i>Cancel
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
